<!DOCTYPE html>
<html>
    <head>
        <title>FOOD ORDER</title>

        <meta charset="UTF-8">
        <meta name="author" content="Lexter Devera">

    </head>
    <body>
        <form name="checkout-form" action="checkout.html" onsubmit="return validateForm()">
        <label for="name">Name</label>
        <input type="text" name="name" id="name" required>

        <br><br>

        <label for="meat">How much kilos of Meat would you like to buy?</label>
        <input type="number" name="meat" id="meat" min="0" max="100">

        <br><br>

        <label for="chicken">How much kilos of Chicken would you like to buy?</label>
        <input type="number" name="chicken" id="chicken" min="0" max="100">

        <br><br>

        <label for="payment">How much money do you have?</label>
        <input type="number" name="payment" id="payment" min="0" max="100000" step="0.01">

        <br><br>

        <button type="submit">Submit</button>
        <button type="reset">Reset</button>
    </form>

    <script src="index.js"></script>
    </body>
</html>
